name: Daily Molecule Post

on:
  schedule:
    - cron: '0 11 * * *' # Runs daily at 18:00 UTC
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run the bot script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python main.py

      - name: Commit and push updated history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add posted_cids.txt
          # Only commit if posted_cids.txt has actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update posted history" && git push)
